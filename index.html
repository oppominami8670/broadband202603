<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>固定回線料金シミュレーター</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:0;
}

.container{
max-width:1100px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
}

h1{
text-align:center;
margin-bottom:20px;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:5px;
margin-bottom:10px;
}

.tab-btn{
flex:1;
padding:12px;
border:none;
background:#ddd;
cursor:pointer;
font-weight:bold;
}

.tab-content.active{
display:block;
}

.tab-content{
flex:1;
display:none;
}

.tab-content.active{
display:block;
}

iframe{
width:100%;
height:calc(100vh - 120px);
border:none;
}

</style>

</head>

<body>

<div class="container">

<h1>固定回線料金シミュレーター</h1>

<div class="tabs">

<button class="tab-btn" onclick="openTab('rakuten')">楽天ひかり</button>

<button class="tab-btn active" onclick="openTab('au')">auひかり</button>

<button class="tab-btn" onclick="openTab('nuro')">NURO光</button>

<button class="tab-btn" onclick="openTab('softbank')">ソフトバンク光</button>

<button class="tab-btn" onclick="openTab('docomo')">ドコモ光</button>


<button class="tab-btn" onclick="openTab('jcom')">J:COM</button>

</div>


<div id="au" class="tab-content active">
<iframe src="auひかり.html"></iframe>
</div>

<div id="nuro" class="tab-content">
<iframe src="nuro光.html"></iframe>
</div>

<div id="softbank" class="tab-content">
<iframe src="ソフトバンク光.html"></iframe>
</div>

<div id="docomo" class="tab-content">
<iframe src="ドコモ光.html"></iframe>
</div>

<div id="rakuten" class="tab-content">
<iframe src="楽天ひかり.html"></iframe>
</div>

<div id="jcom" class="tab-content">
<iframe src="jcom.html"></iframe>
</div>

</div>

<script>

function openTab(tabId){

document.querySelectorAll(".tab-content").forEach(el=>{
el.classList.remove("active")
})

document.querySelectorAll(".tab-btn").forEach(el=>{
el.classList.remove("active")
})

document.getElementById(tabId).classList.add("active")

event.target.classList.add("active")

}

</script>

</body>
</html>
