<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ソフトバンク光/Air 料金シミュレーター</title>
    <style>
        :root { --sb-blue: #007aff; --bg-gray: #f4f4f4; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg-gray); padding: 20px; color: #333; line-height: 1.5; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { border-left: 5px solid var(--sb-blue); padding-left: 10px; font-size: 1.1em; margin-bottom: 15px; }
        .btn-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .select-btn {
            padding: 12px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer;
            text-align: center; font-weight: bold; transition: 0.3s; font-size: 0.85em;
        }
        .select-btn.active { border-color: var(--sb-blue); background-color: #eef6ff; color: var(--sb-blue); }
        .select-btn input { display: none; }
        .hidden { display: none; }
        .breakdown { background: #fafafa; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 0.85em; border: 1px dashed #ccc; }
        .price-large { font-size: 1.6em; color: var(--sb-blue); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        .ouchi-master { background: #fffbe6; border: 2px solid #ffe58f !important; color: #856404 !important; }
        .ouchi-master.active { background: #fff3cd !important; border-color: #ffc107 !important; }
        .discount-row { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>ソフトバンク光 / Air シミュレーター</h1>

    <div class="card">
        <h2>1. タイプを選択</h2>
        <div class="btn-group">
            <label class="select-btn active"><input type="radio" name="h-type" value="mansion" checked onchange="updateUI()">マンション</label>
            <label class="select-btn"><input type="radio" name="h-type" value="home" onchange="updateUI()">戸建て</label>
            <label class="select-btn"><input type="radio" name="h-type" value="air" onchange="updateUI()">SoftBank Air</label>
        </div>
    </div>

    <div id="plan-card" class="card">
        <h2>2. プラン（速度）を選択</h2>
        <div class="btn-group">
            <label class="select-btn active"><input type="radio" name="speed-plan" value="1g" checked onchange="calculate()">1ギガ プラン</label>
            <label class="select-btn"><input type="radio" name="speed-plan" value="10g" onchange="calculate()">10ギガ プラン</label>
        </div>
    </div>

    <div id="air-style-card" class="card hidden">
        <h2>2. 契約形態を選択 (Air)</h2>
        <div class="btn-group">
            <label class="select-btn active"><input type="radio" name="air-style" value="purchase" checked onchange="calculate()">端末購入</label>
            <label class="select-btn"><input type="radio" name="air-style" value="rental" onchange="calculate()">端末レンタル</label>
        </div>
    </div>

    <div class="card">
        <h2>3. オプションを選択</h2>
        <div id="ouchi-set-wrapper" class="btn-group" style="grid-template-columns: 1fr;">
            <label class="select-btn ouchi-master" id="btn-ouchi-all">
                <input type="checkbox" id="ouchi-all" onchange="toggleOuchiSet()"> 【セット割引】おうち割 光セットを適用する (550円)
            </label>
        </div>
        <div class="btn-group">
            <label class="select-btn opt-hikari"><input type="checkbox" class="opt-item" id="opt-bb" onchange="calculate()">光BBユニット (513円)</label>
            <label class="select-btn opt-hikari"><input type="checkbox" class="opt-item" id="opt-wifi" onchange="calculate()">Wi-Fiマルチパック (1,089円)</label>
            <label class="select-btn opt-hikari"><input type="checkbox" class="opt-item" id="opt-phone" onchange="calculate()">電話サービス (550円〜)</label>
            <label class="select-btn opt-hikari"><input type="checkbox" id="opt-tv" onchange="calculate()">ソフトバンク光テレビ (990円)</label>
        </div>
    </div>

    <button onclick="calculate()" style="width:100%; padding:18px; background:var(--sb-blue); color:white; border:none; border-radius:8px; font-size:1.1em; cursor:pointer; font-weight:bold;">シミュレーション実行</button>

    <div id="result" class="card hidden">
        <h2>標準月額料金</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <p>月額支払額（税込）</p>
            <span id="res-monthly" class="price-large">0</span>円
        </div>
        <div class="breakdown">
            <strong>【見積もり詳細】</strong>
            <table id="breakdown-table"></table>
        </div>
    </div>
</div>

<script>
    function toggleOuchiSet() {
        const isSet = document.getElementById('ouchi-all').checked;
        document.getElementById('opt-bb').checked = isSet;
        document.getElementById('opt-wifi').checked = isSet;
        document.getElementById('opt-phone').checked = isSet;
        calculate();
    }

    function updateUI() {
        const hType = document.querySelector('input[name="h-type"]:checked').value;
        const planCard = document.getElementById('plan-card');
        const airStyleCard = document.getElementById('air-style-card');
        const hikariOptions = document.querySelectorAll('.opt-hikari');
        const ouchiWrapper = document.getElementById('ouchi-set-wrapper');

        if (hType === 'air') {
            planCard.classList.add('hidden');
            airStyleCard.classList.remove('hidden');
            ouchiWrapper.classList.add('hidden');
            hikariOptions.forEach(el => el.classList.add('hidden'));
        } else {
            planCard.classList.remove('hidden');
            airStyleCard.classList.add('hidden');
            ouchiWrapper.classList.remove('hidden');
            hikariOptions.forEach(el => el.classList.remove('hidden'));
        }
        calculate();
    }

    function calculate() {
        const hType = document.querySelector('input[name="h-type"]:checked').value;
        const speedPlan = document.querySelector('input[name="speed-plan"]:checked').value;
        const isBb = document.getElementById('opt-bb').checked;
        const isWifi = document.getElementById('opt-wifi').checked;
        const isPhone = document.getElementById('opt-phone').checked;
        const isTv = document.getElementById('opt-tv').checked;

        let monthly = 0;
        let rows = '';

        if (hType === 'air') {
            const airStyle = document.querySelector('input[name="air-style"]:checked').value;
            monthly = 5368;
            rows += '<tr><td>SoftBank Air 基本料</td><td>5,368円</td></tr>';
            if (airStyle === 'rental') {
                monthly += 539;
                rows += '<tr><td>Airターミナル レンタル料</td><td>539円</td></tr>';
            } else {
                rows += '<tr><td>Airターミナル分割金 (36回)</td><td>1,980円</td></tr>';
                rows += '<tr class="discount-row"><td>月月割 (端末代相殺割引)</td><td>-1,980円</td></tr>';
            }
        } else {
            if (speedPlan === '10g') {
                monthly = 6380;
                rows += '<tr><td>ソフトバンク光 10ギガ 基本料</td><td>6,380円</td></tr>';
                monthly += 550;
                rows += '<tr><td>ホームゲートウェイ(N)10ギガ</td><td>550円</td></tr>';
            } else {
                monthly = (hType === 'mansion') ? 4180 : 5720;
                rows += `<tr><td>ソフトバンク光 1ギガ 基本料</td><td>${monthly.toLocaleString()}円</td></tr>`;
            }

            rows += '<tr><td>標準工事費分割金 (24回)</td><td>1,320円</td></tr>';
            rows += '<tr class="discount-row"><td>月額割 (工事費相殺割引)</td><td>-1,320円</td></tr>';

            const isOuchiSet = isBb && isWifi && isPhone;
            document.getElementById('ouchi-all').checked = isOuchiSet;

            if (isOuchiSet) {
                monthly += 550;
                rows += '<tr style="color:var(--sb-blue); font-weight:bold;"><td>おうち割 光セット指定オプション</td><td>550円</td></tr>';
            } else {
                if (isBb) { monthly += 513; rows += '<tr><td>光BBユニットレンタル</td><td>513円</td></tr>'; }
                if (isWifi) { monthly += 1089; rows += '<tr><td>Wi-Fiマルチパック</td><td>1,089円</td></tr>'; }
                if (isPhone) { monthly += 550; rows += '<tr><td>電話サービス</td><td>550円〜</td></tr>'; }
            }
            if (isTv) { monthly += 990; rows += '<tr><td>ソフトバンク光テレビ</td><td>990円</td></tr>'; }
        }

        document.getElementById('res-monthly').innerText = monthly.toLocaleString();
        document.getElementById('breakdown-table').innerHTML = rows;
        document.getElementById('result').classList.remove('hidden');

        document.querySelectorAll('.select-btn').forEach(btn => {
            const input = btn.querySelector('input');
            if (input) btn.classList.toggle('active', input.checked);
        });
    }
    updateUI();
</script>
</body>
</html>
